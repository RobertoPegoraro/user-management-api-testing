name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  e2e-tests:
    name: E2E - ${{ matrix.env }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        env: [ dev, prod ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Start API
        run: |
          docker run -d -p 3000:3000 --name api ghcr.io/danielsilva-loanpro/sdet-interview-challenge:latest

          echo "Waiting for API..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/${{ matrix.env }}/users > /dev/null; then
              echo "API ready after $i attempts"
              exit 0
            fi
            sleep 2
          done

          echo "API failed to start"
          docker logs api
          exit 1

      - name: Run E2E tests
        run: ./gradlew :api-testing:testPipeline -Denv=${{ matrix.env }}

      - name: Deploy Allure to GitHub Pages
        uses: simple-elf/allure-report-action@v1.7
        if: always()
        with:
          allure_results: api-testing/build/allure-results
          allure_history: allure-history
          subfolder: ${{ matrix.env }}

      - name: Publish to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
